version: 2
enable-beta-ecosystems: true
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - "dependencies"

  - package-ecosystem: "gradle"
    directories:
      - "/android/"
      - "/example/android/"
    schedule:
      interval: "weekly"
    groups:
      gradle:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "kotlin"

  - package-ecosystem: "bundler"
    directory: "/example/"
    schedule:
      interval: "weekly"
    groups:
      ruby:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ruby"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      rust:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "npm"
    directories:
      - "/example/"
      - "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "typescript"
    # The nitro runtime and codegen pins are deliberate (0.36.1); upgrades
    # are a manual decision with an iOS Release re-test each bump.
    ignore:
      - dependency-name: "react-native-nitro-modules"
      - dependency-name: "nitrogen"
    groups:
      react-native-cli:
        patterns:
          - "@react-native-community/cli*"
      babel:
        patterns:
          - "@babel/*"
      react-native:
        patterns:
          - "@react-native/*"
      npm-misc:
        patterns:
          - "*"
        exclude-patterns:
          - "@react-native-community/cli*"
          - "@babel/*"
          - "@react-native/*"
