name: E2E Android

permissions:
  contents: read

# E2E runs locally (bun run e2e drives two emulators or a device pair);
# CI emulators are too expensive to run automatically. This workflow is
# manual-dispatch only, kept for deliberate one-off verification.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Two-emulator E2E file transfer (50MB)
    runs-on: ubuntu-latest
    # Build+install take ~9 min and every boot/wait below is bounded, so a
    # healthy run fits comfortably; a hang must die fast (billed minutes).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Mirrors Build Android: the rust build plus two emulator system images
      # need more space than a stock runner offers.
      - name: Free disk space
        run: |
          set -uo pipefail
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/.ghcup \
            /opt/ghc \
            /usr/share/swift \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /opt/hostedtoolcache/CodeQL \
            || true
          sudo docker image prune --all --force > /dev/null 2>&1 || true
          df -h /

      # Hardware acceleration for the emulators; ubuntu-latest runners have
      # /dev/kvm but it is root-only by default.
      - name: Enable KVM group perms
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          # Preflight: fail fast (with a clear reason) if hardware
          # acceleration is unavailable - the emulators are launched with
          # "-accel on" and would otherwise die at startup.
          if [ ! -e /dev/kvm ]; then
            echo "error: /dev/kvm does not exist on this runner; KVM acceleration unavailable" >&2
            exit 1
          fi
          if [ ! -r /dev/kvm ] || [ ! -w /dev/kvm ]; then
            echo "error: /dev/kvm exists but is not readable/writable after udev rule" >&2
            ls -l /dev/kvm >&2
            exit 1
          fi
          echo "KVM preflight OK: $(ls -l /dev/kvm)"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies (bun)
        run: bun install --frozen-lockfile

      # JDK 17 serves both Gradle and the Maestro CLI.
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      # Emulators are x86_64, so only that rust target is needed here.
      - name: Install Rust toolchain (x86_64 Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-linux-android

      - name: Cache cargo (registry + target)
        uses: Swatinem/rust-cache@v2

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-e2e-${{ hashFiles('example/android/**/*.gradle*', 'android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-e2e-
            ${{ runner.os }}-gradle-

      - name: Build example app (assembleDebug, x86_64 only)
        working-directory: example/android
        run: ./gradlew assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=x86_64

      - name: Install emulator and system image
        run: |
          set -euo pipefail
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null || true
          "$SDKMANAGER" --install "platform-tools" "emulator" "system-images;android-35;google_apis;x86_64"
          # The freshly installed platform-tools dir is NOT on the runner's
          # PATH (run 29640094362 failed with "adb: command not found").
          # Export it for every later step: emulator boot polling, the E2E
          # harness (which discovers adb via `command -v adb`), and failure
          # log collection. The emulator dir is added for the same reason,
          # even though this workflow invokes it by absolute path.
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"

      # Boots are STAGGERED (second launch only after the first is fully
      # booted): two cold emulators plus gradle/metro on a 4-core runner
      # contend badly, and one-at-a-time failures are far easier to
      # diagnose. Every wait is bounded and every failure path tails the
      # emulator logs into the step output before exiting nonzero.
      - name: Create and boot two emulators
        run: |
          set -euo pipefail
          AVDMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          EMULATOR="$ANDROID_HOME/emulator/emulator"

          dump_emulator_logs() {
            for f in /tmp/emulator-*.log; do
              [ -f "$f" ] || continue
              echo "===== tail of $f ====="
              tail -n 100 "$f" || true
            done
          }

          boot_one() { # boot_one <avd-name> <port> <logfile>
            local name="$1" port="$2" logfile="$3" serial pid waited
            serial="emulator-$port"
            nohup "$EMULATOR" -avd "$name" -port "$port" \
              -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim \
              -no-snapshot -accel on -memory 2048 -cores 2 -partition-size 4096 \
              > "$logfile" 2>&1 &
            pid=$!
            # Phase 1 (bounded, max 300s): serial visible to adb. Detects an
            # instantly-dying emulator within seconds via the process check.
            waited=0
            until adb -s "$serial" get-state >/dev/null 2>&1; do
              if ! kill -0 "$pid" 2>/dev/null; then
                echo "error: emulator process for $serial exited during startup" >&2
                dump_emulator_logs
                exit 1
              fi
              if [ "$waited" -ge 300 ]; then
                echo "error: $serial not visible to adb after 300s" >&2
                dump_emulator_logs
                exit 1
              fi
              sleep 5
              waited=$((waited + 5))
            done
            # Phase 2 (bounded, max 600s): full Android boot.
            waited=0
            until [ "$(adb -s "$serial" shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ]; do
              if ! kill -0 "$pid" 2>/dev/null; then
                echo "error: emulator process for $serial died while booting" >&2
                dump_emulator_logs
                exit 1
              fi
              if [ "$waited" -ge 600 ]; then
                echo "error: $serial did not finish booting within 600s" >&2
                dump_emulator_logs
                exit 1
              fi
              sleep 5
              waited=$((waited + 5))
            done
            echo "$serial booted"
          }

          for name in e2e_a e2e_b; do
            echo no | "$AVDMANAGER" create avd -n "$name" -k "system-images;android-35;google_apis;x86_64" -d medium_phone --force
          done
          boot_one e2e_a 5554 /tmp/emulator-a.log
          boot_one e2e_b 5556 /tmp/emulator-b.log
          adb devices

      # Debug builds load their JS bundle from Metro; the harness wires
      # adb reverse per device itself.
      - name: Start Metro
        working-directory: example
        run: |
          set -euo pipefail
          nohup bun start > /tmp/metro.log 2>&1 &
          timeout 120 bash -c 'until curl -sf http://127.0.0.1:8081/status > /dev/null; do sleep 2; done'
          echo "Metro is up"

      - name: Install Maestro
        run: |
          set -euo pipefail
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # run-e2e.sh itself resets both devices to first-launch state before
      # driving any UI (am force-stop + pm clear per run), so repeated runs
      # and reruns on a warm runner are deterministic.
      - name: Run E2E (two devices, 50MB transfer)
        env:
          FILE_MB: "50"
          E2E_ARTIFACTS: /tmp/e2e-logs
          MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: "true"
          MAESTRO_CLI_NO_ANALYTICS: "1"
        run: bun run e2e

      # failure() alone is NOT enough: a job that hits timeout-minutes is
      # cancelled, and failure()-guarded steps are skipped, losing exactly
      # the logs that explain the hang. cancelled() keeps them running.
      - name: Collect logs on failure or cancellation
        if: failure() || cancelled()
        run: |
          set -uo pipefail
          mkdir -p /tmp/e2e-logs
          adb -s emulator-5554 logcat -d > /tmp/e2e-logs/logcat-emulator-5554.txt 2>/dev/null || true
          adb -s emulator-5556 logcat -d > /tmp/e2e-logs/logcat-emulator-5556.txt 2>/dev/null || true
          cp /tmp/emulator-*.log /tmp/e2e-logs/ 2>/dev/null || true
          cp /tmp/metro.log /tmp/e2e-logs/ 2>/dev/null || true
          cp -r "$HOME"/.maestro/tests /tmp/e2e-logs/maestro-tests 2>/dev/null || true
          ls -la /tmp/e2e-logs

      - name: Upload failure logs
        if: failure() || cancelled()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failure-logs
          path: /tmp/e2e-logs
          if-no-files-found: ignore
