name: Checks

permissions:
  contents: read

# Universal cheap lane: runs on every PR regardless of paths, so the branch
# ruleset always has a required check to satisfy. Heavier suites (rust,
# platform builds) keep their own path-filtered or manual workflows.
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bunx oxlint
      - name: Format check
        run: bunx oxfmt --check
      - name: Unit tests
        run: bun test src
