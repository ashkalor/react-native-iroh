pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{ts,tsx,js,jsx,json,md,yml,yaml,css}"
      run: bunx oxfmt {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx oxlint {staged_files}

pre-push:
  jobs:
    - name: typecheck
      run: bunx tsc --noEmit
